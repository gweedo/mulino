name: backend-tests

on:
  pull_request:
    paths:
      - backend/**
      - .github/workflows/backend.yml
  push:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pizzeria_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Sync dependencies
        run: uv sync --frozen
        working-directory: backend

      - name: Run ruff check
        run: uv run ruff check .
        working-directory: backend

      - name: Run pytest
        run: uv run pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pizzeria_test
          JWT_SECRET: ci-test-secret-not-for-production
