name: frontend-tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run linter
        run: npm run lint
        working-directory: frontend

      - name: Check API types are up to date
        run: |
          npm run types:gen
          git diff --exit-code src/lib/api-types.ts || \
            (echo "api-types.ts is out of sync. Run 'npm run types:gen' from frontend/ and commit the result." && exit 1)
        working-directory: frontend

      - name: Run tests
        run: npm run test:run
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
