name: frontend-tests

on:
  pull_request:
    paths:
      - frontend/**
      - .github/workflows/frontend.yml
  push:
    branches:
      - main

jobs:
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect frontend scaffold
        id: scaffold
        run: |
          if [ -f frontend/package.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::frontend/package.json not found — skipping frontend checks."
          fi

      - name: Set up Node 20
        if: steps.scaffold.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.scaffold.outputs.ready == 'true'
        run: npm ci
        working-directory: frontend

      - name: Run linter
        if: steps.scaffold.outputs.ready == 'true'
        run: npm run lint
        working-directory: frontend

      - name: Run tests
        if: steps.scaffold.outputs.ready == 'true'
        run: npm test -- --run
        working-directory: frontend

      - name: Build
        if: steps.scaffold.outputs.ready == 'true'
        run: npm run build
        working-directory: frontend
